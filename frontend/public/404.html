<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GA4GH Schema Registry</title>
    <script>
      // GitHub Pages SPA redirect hack
      // Stores the path in sessionStorage and redirects to index.html,
      // which then restores the path for React Router.
      var pathSegmentsToKeep = 1; // Keep /schema-registry-site/ prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
